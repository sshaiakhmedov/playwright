name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm ci
        npm install -D allure-playwright
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    
    - name: Run Playwright tests
      run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      env:
        DEMOBLAZE_USERNAME: ${{ secrets.DEMOBLAZE_USERNAME }}
        DEMOBLAZE_PASSWORD: ${{ secrets.DEMOBLAZE_PASSWORD }}
    
    - name: Generate Allure Report
      if: always()
      run: |
        npx allure generate ./allure-results --clean || echo "Allure report generation skipped"
      continue-on-error: true
    
    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.shardIndex }}
        path: playwright-report/
        retention-days: 30
    
    - name: Upload Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.shardIndex }}
        path: allure-results/
        retention-days: 30
    
    - name: Upload Allure Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report-${{ matrix.shardIndex }}
        path: allure-report/
        retention-days: 30
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.shardIndex }}
        path: test-results/
        retention-days: 30

  test-docker:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t pw-tests .
    
    - name: Run tests in Docker
      run: docker run --rm -e DEMOBLAZE_USERNAME -e DEMOBLAZE_PASSWORD pw-tests
      env:
        DEMOBLAZE_USERNAME: ${{ secrets.DEMOBLAZE_USERNAME }}
        DEMOBLAZE_PASSWORD: ${{ secrets.DEMOBLAZE_PASSWORD }}
    
    - name: Extract test results from Docker
      if: always()
      run: |
        # Create a temporary container to copy results
        CONTAINER_ID=$(docker create pw-tests)
        docker cp $CONTAINER_ID:/usr/src/app/playwright-report ./playwright-report-docker || true
        docker cp $CONTAINER_ID:/usr/src/app/allure-results ./allure-results-docker || true
        docker cp $CONTAINER_ID:/usr/src/app/test-results ./test-results-docker || true
        docker rm $CONTAINER_ID
    
    - name: Upload Docker Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: docker-test-results
        path: |
          playwright-report-docker/
          allure-results-docker/
          test-results-docker/
        retention-days: 30